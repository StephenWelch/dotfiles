set-window-option -g mode-keys vi

# Use 'v' to begin selection (like visual mode in vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Use 'y' to yank (copy) text
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Use 'Ctrl+v' for rectangle-toggle
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# --- Claude Code friendliness ---
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"
set -sg escape-time 0
set -g set-clipboard on

# Highlight windows that produce activity / bells while you're elsewhere —
# pairs with the Claude Stop hook that runs `tmux display-message`.
set -g monitor-activity on
set -g visual-activity off
set -g monitor-bell on
set -g visual-bell off
set -g bell-action any
